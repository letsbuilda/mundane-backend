name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          resolution-strategy: "lowest"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Sync dependencies
        run: uv sync --group dev --group tests

      - name: Run prek
        run: uv run prek run --all-files

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run Ruff checks
        run: uv run ruff check --output-format=github .

      - name: Run mypy
        run: uv run mypy --strict src/

      - name: Run ty
        run: uv run ty check .

  test:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          resolution-strategy: "lowest"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Sync dependencies
        run: uv sync --group tests

      - name: Run tests with coverage
        run: uv run coverage run -m pytest -v --junitxml=junit.xml --alluredir allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: error

      - name: Create coverage report
        run: uv run coverage xml -o coverage.xml

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: error

  codecov:
    runs-on: ubuntu-slim
    needs: [test]
    if: ${{ always() }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage reports
        if: ${{ !cancelled() }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: coverage
          use_oidc: true
          files: coverage/coverage.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          use_oidc: true
          files: coverage/junit.xml

  upload-allure-report:
    name: Upload Allure report
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download Allure results artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate --clean --single-file

      - name: Give report a better name
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NAME="allure-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}-run${{ github.run_number }}.html"
          else
            NAME="allure-main-${SHORT_SHA}-run${{ github.run_number }}.html"
          fi

          mv allure-report/index.html "$NAME"
          echo "REPORT_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload Allure report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          archive: false
          path: ${{ env.REPORT_NAME }}
          if-no-files-found: error
